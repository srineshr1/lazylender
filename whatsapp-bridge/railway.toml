[build]
  builder = "DOCKERFILE"
  dockerfilePath = "Dockerfile"

[deploy]
  numInstances = 1
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10

# ─── Set these in the Railway Dashboard → Variables tab ───
# Required:  NODE_ENV=production
# Required:  ALLOWED_ORIGINS=https://kairocalender.web.app
# Required:  CALENDAR_URL=https://kairocalender.web.app
# Required:  BRIDGE_REQUIRE_AUTH=true
# Required:  GROQ_API_KEY=<your actual key>
# Required:  BRIDGE_ADMIN_API_KEY=<long random secret – never commit this>
# NOTE: Do NOT set PORT manually; Railway injects it automatically.
