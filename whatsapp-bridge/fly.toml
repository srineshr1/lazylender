# Fly.io app configuration for WhatsApp Bridge
app = "kairo-bridge"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  BRIDGE_PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

# Persist WhatsApp session data across restarts
[mounts]
  source = "whatsapp_sessions"
  destination = "/app/sessions"

# Health check
[checks]
  [checks.health]
    port = 3001
    type = "http"
    path = "/health"
    interval = "30s"
    timeout = "10s"
